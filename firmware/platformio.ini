[platformio]
default_envs = pico

[env:pico]
platform = raspberrypi
board = pico
framework = pico-sdk
monitor_speed = 115200

; Keep UART debug enabled and USB stdio disabled (USB is used in host mode).
build_flags =
  -D PICO_STDIO_UART=1
  -D PICO_STDIO_USB=0

; RP2040 BOOTSEL upload via mounted mass-storage drive.
; Override with: pio run -t upload --upload-port /path/to/RPI-RP2
upload_protocol = custom
upload_command = bash -lc 'set -euo pipefail; TARGET="${UPLOAD_PORT:-/media/$USER/RPI-RP2}"; cp "$SOURCE" "$TARGET"/ && sync'
