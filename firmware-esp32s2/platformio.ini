[platformio]
default_envs = lolin_s2_mini

[env:lolin_s2_mini]
platform = espressif32
board = lolin_s2_mini
framework = arduino
monitor_speed = 115200
upload_speed = 460800
build_unflags =
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MSC_ON_BOOT=1
  -DARDUINO_USB_DFU_ON_BOOT=1
build_flags =
  -D ARDUINO_USB_MODE=0
  -D ARDUINO_USB_CDC_ON_BOOT=0
  -D ARDUINO_USB_MSC_ON_BOOT=0
  -D ARDUINO_USB_DFU_ON_BOOT=0
  -D USB_SWITCH_SEL_PIN=10
  -D PWR_BTN_PIN=13
  -D PC_VBUS_SENSE_PIN=9
  -D DEV_VBUS_SENSE_PIN=12
  -D PSU_ON_PIN=8
  -D WAKE_DETECT_FROM_HID=1
  ; Set to 0 to compile out Serial logging entirely.
  ; -D ENABLE_LOGGING=0
  ; If mux PC/monitor ports are physically swapped, invert select polarity.
  ; -D USB_SWITCH_PC_SEL_LEVEL=0
  ; Uncomment if you want explicit LED pin/polarity overrides.
  ; If STATUS_LED_PIN is omitted, firmware uses LED_BUILTIN when available.
  ; -D STATUS_LED_PIN=LED_BUILTIN
  ; -D STATUS_LED_ACTIVE_LOW=1
  ; If your PSU driver transistor inverts the control logic, uncomment this.
  ; -D PSU_ON_ACTIVE_LOW=1
